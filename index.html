<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .card { background: linear-gradient(145deg, #1e1e1e, #252525); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
        .stat-val { color: #4CAF50; font-weight: bold; font-size: 1.2em; }
        .btn { background: #4CAF50; border: none; color: white; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); background: #45a049; }
        .btn-blue { background: #2196F3; }
    </style>
</head>
<body>
    <div class="header">
        <h3 id="user_name">Панель Админа</h3>
    </div>

    <div class="card">
        <div>Баллы: <span id="points" class="stat-val">0</span></div>
        <div>Одобрено сегодня: <span id="daily" class="stat-val">0</span></div>
        <div>Статус: <span id="leave" style="color: #ff9800;">Загрузка...</span></div>
    </div>

    <h3>🛒 Магазин отгулов</h3>
    <div class="card">
        <p>Отгул на 3 часа</p>
        <button class="btn" onclick="buy('otgul_3h', 60)">Купить (60 pts)</button>
    </div>
    
    <div class="card">
        <p>Отпуск на 1 день</p>
        <button class="btn btn-blue" onclick="buy('vac_1d', 100)">Купить (100 pts)</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Растянуть на весь экран
        
        const API_URL = "https://DimkaJopka.pythonanywhere.com"; // ТВОЙ АДРЕС НА PYTHONANYWHERE
        let uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 123456; // Для теста, если открыто не в телеге
        
        if (tg.initDataUnsafe.user) {
            document.getElementById('user_name').innerText = tg.initDataUnsafe.user.first_name;
        }

        async function loadData() {
            try {
                let response = await fetch(`${API_URL}/api/admin_info/${uid}`);
                let data = await response.json();
                document.getElementById('points').innerText = data.points;
                document.getElementById('daily').innerText = data.daily;
                document.getElementById('leave').innerText = data.leave;
            } catch (e) {
                console.error("Ошибка загрузки данных");
            }
        }

        async function buy(itemId, price) {
            if (!confirm(`Купить за ${price} баллов?`)) return;
            
            let response = await fetch(`${API_URL}/api/buy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ uid: uid, item_id: itemId })
            });
            let result = await response.json();
            alert(result.success ? "Успешно куплено!" : "Ошибка: " + result.msg);
            loadData();
        }

        loadData();
    </script>
</body>
</html>
